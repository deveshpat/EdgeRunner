name: Build prebuilt wheels (CPU)

# llama-cpp-python MUST be built on manylinux (older glibc).
# Ubuntu 24.04 GHA runners produce GLIBC_2.38 wheels that fail on Kaggle:
#   version `GLIBC_2.38' not found

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "backend/requirements.txt"
      - "wheels/**"
      - "scripts/kaggle_build_wheels.py"
      - ".github/workflows/build-wheels.yml"

permissions:
  contents: write

jobs:
  # ── Native extension: manylinux_2_28 (glibc 2.28) ─────────────────────────
  llama-manylinux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # manylinux python tags
        py: ["cp310-cp310", "cp311-cp311", "cp312-cp312"]
    steps:
      - uses: actions/checkout@v4

      - name: Build llama-cpp-python inside manylinux_2_28
        run: |
          mkdir -p wheelhouse
          docker run --rm \
            -v "$PWD":/io \
            -e CMAKE_ARGS="-DGGML_NATIVE=OFF -DGGML_CUDA=OFF" \
            -e FORCE_CMAKE=1 \
            quay.io/pypa/manylinux_2_28_x86_64 \
            bash -lc '
              set -euo pipefail
              PYBIN=/opt/python/${{ matrix.py }}/bin
              "$PYBIN/python" -m pip install -U pip wheel setuptools cmake ninja
              rm -rf /tmp/ldist && mkdir -p /tmp/ldist
              "$PYBIN/pip" wheel "llama-cpp-python==0.3.33" \
                -w /tmp/ldist --no-deps --no-cache-dir
              # Prefer auditwheel repair for proper manylinux tag
              mkdir -p /io/wheelhouse
              for w in /tmp/ldist/llama_cpp_python-*.whl; do
                if command -v auditwheel >/dev/null 2>&1; then
                  auditwheel repair "$w" -w /io/wheelhouse || cp "$w" /io/wheelhouse/
                else
                  cp "$w" /io/wheelhouse/
                fi
              done
              ls -lah /io/wheelhouse/
            '

      - name: Alias stable filenames
        run: |
          PYTAG=$(echo "${{ matrix.py }}" | cut -d- -f1)  # cp312
          mkdir -p dist
          shopt -s nullglob
          for w in wheelhouse/llama_cpp_python-*.whl; do
            cp -f "$w" dist/
            # Stable names bootstrap looks for
            cp -f "$w" "dist/llama_cpp_python-0.3.33-${PYTAG}-${PYTAG}-manylinux_2_28_x86_64.whl"
            cp -f "$w" "dist/llama_cpp_python-0.3.33-${PYTAG}-${PYTAG}-linux_x86_64.whl"
          done
          ls -lah dist/

      - uses: actions/upload-artifact@v4
        with:
          name: llama-${{ matrix.py }}
          path: dist/*.whl

  # ── Pure / binary deps (any modern linux is fine) ─────────────────────────
  pure-wheels:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Wheel pure/runtime deps
        run: |
          python -m pip install -U pip wheel
          mkdir -p dist
          pip wheel \
            "fastapi" "uvicorn[standard]" "pydantic" \
            "langchain" "langchain-community" "langgraph" \
            "huggingface-hub>=0.23,<2" "psutil" "httpx" \
            "typing-extensions" "numpy" "diskcache" "jinja2" \
            -w dist --no-cache-dir
          # Explicitly do NOT include llama-cpp-python here
          rm -f dist/llama_cpp_python-*.whl || true
          PYTAG="cp$(echo ${{ matrix.python-version }} | tr -d .)"
          tar -C dist -czf "edgerunner-wheels-${PYTAG}-cpu.tar.gz" .
          ls -lah
      - uses: actions/upload-artifact@v4
        with:
          name: pure-cp${{ matrix.python-version }}
          path: |
            dist/*.whl
            edgerunner-wheels-*.tar.gz

  publish:
    needs: [llama-manylinux, pure-wheels]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: all
          merge-multiple: true
      - name: Collect + rebuild full bundles (pure + manylinux llama)
        run: |
          set -euo pipefail
          mkdir -p publish
          find all -name '*.whl' -exec cp {} publish/ \;
          # Drop host-glibc linux_x86_64 aliases that break on Kaggle (keep manylinux only)
          # Keep py3-none-linux only if no manylinux exists — prefer manylinux names.
          echo "=== llama wheels ==="
          ls -lah publish/llama* 2>/dev/null || true

          # Rebuild per-py tarballs so Kaggle gets ONE download with llama included
          for PY in cp310 cp311 cp312; do
            stage=$(mktemp -d)
            # pure / shared wheels that match this py or are py3-none
            shopt -s nullglob
            for w in publish/*.whl; do
              bn=$(basename "$w")
              bl=$(echo "$bn" | tr '[:upper:]' '[:lower:]')
              # skip cuda
              if echo "$bl" | grep -qE 'cu1[0-9]|cuda|\+cu'; then continue; fi
              # skip wrong-abi binary wheels
              if echo "$bl" | grep -qE 'cp[0-9]+-cp[0-9]+' && ! echo "$bl" | grep -q "$PY"; then
                # still allow abi3
                if ! echo "$bl" | grep -qE 'abi3|cp37-abi3|none-any|py2\.py3|py3-none'; then
                  continue
                fi
              fi
              # llama: only manylinux for this py
              if echo "$bl" | grep -q 'llama_cpp_python'; then
                if echo "$bl" | grep -q "manylinux" && echo "$bl" | grep -q "$PY"; then
                  cp -f "$w" "$stage/"
                fi
                continue
              fi
              cp -f "$w" "$stage/" || true
            done
            # Ensure at least the stable manylinux llama name is present
            for w in publish/llama_cpp_python-*-${PY}-${PY}-manylinux_2_28_x86_64.whl; do
              [ -f "$w" ] && cp -f "$w" "$stage/"
            done
            out="publish/edgerunner-wheels-${PY}-cpu.tar.gz"
            tar -C "$stage" -czf "$out" .
            echo "=== $out ($(du -h "$out" | cut -f1)) files=$(ls "$stage" | wc -l) ==="
            ls "$stage" | grep -i llama || echo "(no llama in bundle — check manylinux job)"
            rm -rf "$stage"
          done
          echo "=== bundles ==="
          ls -lah publish/edgerunner-wheels* 2>/dev/null || true
          ls publish | wc -l
      - name: Publish wheels-v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view wheels-v1 >/dev/null 2>&1; then
            gh release create wheels-v1 \
              --title "Prebuilt wheels (Kaggle-compatible manylinux)" \
              --notes "llama-cpp-python built on manylinux_2_28 (glibc 2.28) for Kaggle. Pure deps + tarballs included."
          fi
          gh release upload wheels-v1 publish/* --clobber
