name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Pack Kaggle worker bundle
        working-directory: .
        run: python3 scripts/pack_kernel_bundle.py

      - name: Install dependencies
        # npm install is more tolerant than npm ci when optional platform
        # packages (e.g. @emnapi/*) differ across npm versions.
        run: npm install --no-audit --no-fund

      - name: Build with Next.js
        run: npx next build
        env:
          NEXT_PUBLIC_BASE_PATH: /EdgeRunner
          # Fallback if config.json is empty; public/config.json is source of truth at runtime
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID || '175039186672-j4a0kr8q6n1knhkh37ssb78i2qrfl75q.apps.googleusercontent.com' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
